version: 1.0
runtime: python311
build:
  commands:
    build:
      - pip install -r requirements.txt
      - playwright install chromium --with-deps
run:
  command: uvicorn main:app --host 0.0.0.0 --port 8080
  network:
    port: 8080
    env: PORT
  env:
    - name: APP_ENV
      value: production
    - name: PLAYWRIGHT_BROWSERS_PATH
      value: /ms-playwright
