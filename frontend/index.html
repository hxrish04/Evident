<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Evident</title>
  <meta name="theme-color" content="#0b0a08" />
  <link rel="icon" type="image/svg+xml" href="/assets/logo-mark.svg" />
  <style>
    :root {
      --bg: #0b0a08;
      --surface: #161411;
      --surface-soft: #1b1815;
      --surface-elevated: #211d19;
      --surface-muted: rgba(255, 255, 255, 0.028);
      --ink: #f3eee4;
      --muted: #a49a8d;
      --line: rgba(255, 255, 255, 0.08);
      --line-strong: rgba(255, 255, 255, 0.14);
      --accent: #7f9a8b;
      --accent-soft: rgba(127, 154, 139, 0.14);
      --good: #95c4a4;
      --good-soft: rgba(97, 146, 111, 0.16);
      --warn: #d2ad76;
      --warn-soft: rgba(171, 125, 57, 0.14);
      --danger: #d98f82;
      --danger-soft: rgba(157, 86, 76, 0.15);
      --shadow: 0 18px 38px rgba(0, 0, 0, 0.24);
      --radius-xl: 24px;
      --radius-lg: 18px;
      --radius-md: 14px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      color-scheme: dark;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      color: var(--ink);
      background: #0c0b09;
    }

    a {
      color: var(--accent);
    }

    .shell {
      max-width: 1480px;
      margin: 0 auto;
      padding: 18px 18px 40px;
    }

    .surface,
    .list-pane,
    .detail-pane,
    .support-shell,
    .draft-card,
    .history-card,
    .summary-stat,
    .summary-assessment,
    .source,
    .trace-line,
    .empty {
      background: rgba(22, 20, 17, 0.94);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
    }

    .launch-shell {
      display: grid;
      grid-template-columns: minmax(280px, 360px) minmax(0, 1fr);
      gap: 18px;
      align-items: start;
      margin-bottom: 18px;
    }

    .launch-copy,
    .launch-form {
      border-radius: var(--radius-xl);
      padding: 20px;
    }

    .launch-copy {
      background: transparent;
      border: 1px solid transparent;
      box-shadow: none;
      padding-left: 6px;
    }

    .launch-form {
      background: rgba(22, 20, 17, 0.94);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: var(--accent);
    }

    .eyebrow::before {
      content: "";
      width: 28px;
      height: 1px;
      background: currentColor;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(2rem, 4vw, 3.35rem);
      line-height: 0.98;
      letter-spacing: -0.04em;
      max-width: 10ch;
    }

    h2 {
      margin: 0;
      font-size: 1.02rem;
      letter-spacing: -0.02em;
    }

    .hero-copy {
      margin: 0;
      color: var(--ink);
      font-size: 1.02rem;
      line-height: 1.45;
      font-weight: 600;
    }

    .supporting-copy,
    .panel-copy,
    .muted {
      color: var(--muted);
      line-height: 1.55;
      font-size: 0.92rem;
    }

    .supporting-copy {
      margin: 12px 0 0;
      max-width: 34ch;
    }

    .launch-header {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
      margin-bottom: 16px;
    }

    .launch-title p {
      margin: 6px 0 0;
      max-width: 48ch;
    }

    .run-actions-hint {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border-radius: 999px;
      background: var(--surface-muted);
      border: 1px solid var(--line);
      color: var(--muted);
      font-size: 0.78rem;
      white-space: nowrap;
    }

    .field {
      margin-bottom: 14px;
    }

    .field-row {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 0.76rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.16em;
    }

    input,
    textarea,
    select {
      width: 100%;
      border-radius: var(--radius-md);
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.025);
      color: var(--ink);
      font: inherit;
      font-size: 0.95rem;
      line-height: 1.45;
      padding: 13px 14px;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    }

    input:focus,
    textarea:focus,
    select:focus {
      border-color: rgba(127, 154, 139, 0.68);
      box-shadow: 0 0 0 4px rgba(127, 154, 139, 0.12);
      background: rgba(255, 255, 255, 0.04);
    }

    textarea {
      min-height: 108px;
      resize: vertical;
    }

    .profile-box {
      min-height: 168px;
    }

    .advanced-panel,
    .disclosure {
      border-radius: var(--radius-lg);
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.02);
      margin-top: 4px;
    }

    .advanced-panel summary,
    .disclosure summary {
      list-style: none;
      cursor: pointer;
      padding: 14px 16px;
      font-size: 0.92rem;
      font-weight: 700;
      color: var(--ink);
    }

    .advanced-panel summary::-webkit-details-marker,
    .disclosure summary::-webkit-details-marker {
      display: none;
    }

    .advanced-summary-copy {
      display: block;
      margin-top: 5px;
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 400;
      letter-spacing: 0;
      text-transform: none;
    }

    .advanced-body {
      padding: 0 16px 16px;
    }

    .advanced-panel[open] summary,
    .disclosure[open] summary {
      border-bottom: 1px solid var(--line);
      margin-bottom: 14px;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 16px;
    }

    button {
      border: 1px solid transparent;
      border-radius: 999px;
      padding: 12px 16px;
      font: inherit;
      font-size: 0.92rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.16s ease, border-color 0.16s ease, background 0.16s ease;
    }

    button:hover:enabled {
      transform: translateY(-1px);
    }

    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
      transform: none;
    }

    .primary {
      color: #0d120f;
      background: var(--accent);
      border-color: rgba(127, 154, 139, 0.5);
    }

    .secondary {
      color: var(--ink);
      background: rgba(255, 255, 255, 0.03);
      border-color: var(--line);
    }

    .status {
      min-height: 24px;
      margin-top: 14px;
      color: var(--muted);
      line-height: 1.5;
      font-size: 0.9rem;
    }

    .status.error {
      color: var(--danger);
    }

    .status.success {
      color: var(--good);
    }

    .progress-board {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 8px;
      margin-top: 12px;
    }

    .progress-step {
      padding: 10px 12px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.025);
      color: var(--muted);
      font-size: 0.79rem;
      text-align: center;
    }

    .progress-step.active {
      color: var(--ink);
      background: rgba(127, 154, 139, 0.16);
      border-color: rgba(127, 154, 139, 0.32);
    }

    .progress-step.done {
      color: var(--good);
      background: rgba(68, 162, 101, 0.14);
      border-color: rgba(68, 162, 101, 0.22);
    }

    .results {
      display: none;
    }

    .results.visible {
      display: block;
    }

    .summary-strip {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr)) minmax(260px, 1.7fr);
      gap: 12px;
      margin-bottom: 18px;
    }

    .summary-stat,
    .summary-assessment {
      border-radius: var(--radius-lg);
      padding: 14px 15px;
      min-height: 86px;
    }

    .summary-stat span,
    .summary-assessment span {
      display: block;
      color: var(--muted);
      font-size: 0.76rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-bottom: 10px;
    }

    .summary-stat strong {
      display: block;
      font-size: 1.34rem;
      line-height: 1;
      margin-bottom: 6px;
    }

    .summary-stat small {
      color: var(--muted);
      font-size: 0.82rem;
    }

    .summary-assessment {
      background: rgba(127, 154, 139, 0.1);
      border-color: rgba(127, 154, 139, 0.22);
    }

    .summary-assessment strong {
      display: block;
      font-size: 0.98rem;
      line-height: 1.45;
      font-weight: 600;
    }

    .workspace-main {
      display: grid;
      grid-template-columns: 360px minmax(0, 1fr);
      gap: 18px;
      align-items: start;
      min-height: 0;
    }

    .list-pane,
    .detail-pane,
    .support-shell {
      border-radius: var(--radius-xl);
      overflow: hidden;
      min-height: 0;
    }

    .pane-header,
    .support-header {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
      padding: 18px 20px 14px;
      border-bottom: 1px solid var(--line);
    }

    .pane-copy {
      margin-top: 6px;
      color: var(--muted);
      font-size: 0.88rem;
      line-height: 1.45;
    }

    .pane-body {
      padding: 12px;
      min-height: 0;
    }

    .candidate-list {
      display: grid;
      gap: 10px;
      max-height: calc(100vh - 278px);
      overflow: auto;
      padding-right: 2px;
      overscroll-behavior: contain;
    }

    .candidate-item {
      width: 100%;
      text-align: left;
      border-radius: var(--radius-lg);
      padding: 14px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--line);
      color: var(--ink);
    }

    .candidate-item.active {
      background: rgba(127, 154, 139, 0.08);
      border-color: rgba(127, 154, 139, 0.28);
      box-shadow: inset 0 0 0 1px rgba(127, 154, 139, 0.14);
    }

    .candidate-top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
      margin-bottom: 10px;
    }

    .candidate-name,
    .person {
      margin: 0;
      font-size: 1rem;
      letter-spacing: -0.02em;
    }

    .person {
      font-size: 1.34rem;
    }

    .candidate-role,
    .role {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 0.86rem;
      line-height: 1.4;
    }

    .candidate-score {
      padding: 8px 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--line);
      color: var(--ink);
      font-size: 0.84rem;
      font-weight: 700;
      white-space: nowrap;
    }

    .candidate-meta,
    .mini-badges,
    .badges,
    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .candidate-meta {
      margin-bottom: 10px;
    }

    .candidate-signals,
    .draft-signals,
    .summary-signals {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 14px;
      margin-bottom: 10px;
      color: var(--muted);
      font-size: 0.81rem;
      line-height: 1.5;
    }

    .candidate-signals strong,
    .draft-signals strong,
    .summary-signals strong {
      color: var(--ink);
      font-weight: 650;
    }

    .candidate-summary {
      margin: 0;
      color: var(--muted);
      font-size: 0.88rem;
      line-height: 1.48;
      display: -webkit-box;
      -webkit-line-clamp: 1;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .badge,
    .meta-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 0.77rem;
      font-weight: 700;
      background: rgba(255, 255, 255, 0.045);
      border: 1px solid var(--line);
      color: var(--ink);
    }

    .badge.good {
      background: var(--good-soft);
      border-color: rgba(68, 162, 101, 0.26);
      color: var(--good);
    }

    .badge.warn {
      background: var(--warn-soft);
      border-color: rgba(184, 133, 58, 0.26);
      color: var(--warn);
    }

    .badge.danger {
      background: var(--danger-soft);
      border-color: rgba(176, 74, 74, 0.26);
      color: var(--danger);
    }

    .detail-pane .pane-body {
      max-height: calc(100vh - 278px);
      overflow: auto;
      padding: 16px;
      position: relative;
      isolation: isolate;
      overscroll-behavior: contain;
    }

    .decision-card {
      border-radius: 20px;
      padding: 18px;
      margin-bottom: 14px;
      background: rgba(27, 24, 21, 0.96);
      border: 1px solid var(--line-strong);
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.16);
    }

    .detail-head {
      display: flex;
      justify-content: space-between;
      gap: 18px;
      align-items: flex-start;
      margin-bottom: 14px;
    }

    .decision-summary {
      margin: 0 0 12px;
      font-size: 1rem;
      line-height: 1.55;
      color: var(--ink);
    }

    .decision-metrics {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-top: 14px;
    }

    .decision-metric {
      border-radius: 16px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.028);
      padding: 12px;
    }

    .decision-metric span {
      display: block;
      color: var(--muted);
      font-size: 0.74rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-bottom: 6px;
    }

    .decision-metric strong {
      display: block;
      font-size: 1rem;
      line-height: 1.3;
      letter-spacing: -0.02em;
    }

    .decision-metric small {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 0.79rem;
      line-height: 1.45;
    }

    .casefile-tabs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .casefile-tab {
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.024);
      color: var(--muted);
      padding: 8px 12px;
      font-size: 0.84rem;
      font-weight: 700;
    }

    .casefile-tab.active {
      background: rgba(127, 154, 139, 0.14);
      border-color: rgba(127, 154, 139, 0.26);
      color: var(--ink);
    }

    .casefile-layout {
      display: grid;
      gap: 12px;
    }

    .case-section {
      border-radius: var(--radius-lg);
      padding: 16px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--line);
    }

    .case-section.full {
      grid-column: 1 / -1;
    }

    .section-kicker {
      display: block;
      margin-bottom: 10px;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.14em;
      font-size: 0.72rem;
      font-weight: 700;
    }

    .copy,
    .draft-body {
      line-height: 1.65;
      font-size: 0.93rem;
      color: var(--ink);
    }

    .detail-section {
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid var(--line);
    }

    .trace-line,
    .source,
    .empty {
      border-radius: 16px;
      padding: 12px;
      background: rgba(255, 255, 255, 0.026);
      box-shadow: none;
    }

    .trace-line + .trace-line,
    .source + .source {
      margin-top: 8px;
    }

    .trace-label {
      display: block;
      margin-bottom: 4px;
      color: var(--muted);
      font-size: 0.74rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }

    .source-list,
    .draft-list,
    .history-list {
      display: grid;
      gap: 12px;
    }

    .source-title,
    .source-title a,
    .profile-link {
      color: var(--ink);
      font-weight: 700;
      text-decoration: none;
      word-break: break-word;
    }

    .source-meta {
      color: var(--muted);
      font-size: 0.82rem;
      line-height: 1.5;
      margin: 5px 0 0;
    }

    .draft-card,
    .history-card {
      padding: 16px 18px;
      border-radius: 20px;
    }

    .draft-subject {
      margin: 12px 0 10px;
      font-size: 1rem;
      color: var(--ink);
      letter-spacing: -0.02em;
    }

    .draft-body {
      white-space: pre-wrap;
      color: var(--ink);
    }

    .draft-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 14px;
      flex-wrap: wrap;
    }

    .support-shell {
      margin-top: 18px;
    }

    .tabs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .tab {
      padding: 9px 14px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--line);
      color: var(--muted);
    }

    .tab.active {
      color: var(--ink);
      background: rgba(127, 154, 139, 0.14);
      border-color: rgba(127, 154, 139, 0.26);
    }

    .tab-panel {
      display: none;
      padding: 18px;
    }

    .tab-panel.active {
      display: block;
    }

    .metrics-layout {
      display: grid;
      gap: 16px;
    }

    .metrics-section {
      border-radius: 18px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.02);
      padding: 16px;
    }

    .metrics-section-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-top: 12px;
    }

    .metric-tile {
      border-radius: 16px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.025);
      padding: 12px;
    }

    .metric-tile span {
      display: block;
      color: var(--muted);
      font-size: 0.76rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 8px;
    }

    .metric-tile strong {
      display: block;
      font-size: 1.08rem;
      letter-spacing: -0.02em;
    }

    .history-controls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 14px;
      align-items: center;
    }

    .history-controls input,
    .history-controls select {
      max-width: 240px;
    }

    .empty {
      color: var(--muted);
    }

    @media (max-width: 1240px) {
      .summary-strip {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .workspace-main {
        grid-template-columns: 320px minmax(0, 1fr);
      }

      .metrics-section-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 1080px) {
      .launch-shell,
      .workspace-main {
        grid-template-columns: 1fr;
      }

      .candidate-list,
      .detail-pane .pane-body {
        max-height: none;
      }
    }

    @media (max-width: 760px) {
      .shell {
        padding: 14px 12px 32px;
      }

      .field-row,
      .summary-strip,
      .decision-metrics,
      .metrics-section-grid,
      .progress-board {
        grid-template-columns: 1fr;
      }

      .launch-header,
      .pane-header,
      .support-header,
      .detail-head,
      .candidate-top {
        flex-direction: column;
      }

      .run-actions-hint {
        white-space: normal;
      }
    }
    .shell {
      padding-top: 10px;
      padding-bottom: 36px;
    }

    .topbar {
      display: grid;
      gap: 20px;
      margin-bottom: 18px;
    }

    .brand-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 24px;
    }

    .brand-lockup {
      display: block;
      width: clamp(340px, 39vw, 520px);
      height: auto;
      flex-shrink: 0;
    }

    .hero-layout {
      display: grid;
      grid-template-columns: minmax(0, 1.24fr) minmax(320px, 0.86fr);
      gap: clamp(36px, 6vw, 112px);
      align-items: start;
    }

    .hero-main,
    .hero-side {
      min-width: 0;
    }

    .hero-main h1 {
      margin: 0;
      max-width: 14.2ch;
      font-size: clamp(3.3rem, 5.2vw, 5.45rem);
      line-height: 0.9;
      letter-spacing: -0.05em;
    }

    .hero-side .hero-copy {
      margin: 0;
      max-width: 17.5ch;
      font-size: clamp(1.36rem, 1.9vw, 1.78rem);
      font-weight: 650;
      line-height: 1.22;
      letter-spacing: -0.03em;
    }

    .hero-side .supporting-copy {
      margin: 0;
      max-width: 32ch;
      font-size: 1.06rem;
      line-height: 1.5;
      color: rgba(243, 238, 228, 0.76);
    }

    .hero-side {
      display: grid;
      gap: 16px;
      align-content: start;
      justify-items: start;
      padding-top: 8px;
    }

    .view-switch {
      display: flex;
      gap: 4px;
      align-items: center;
      padding: 4px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.06);
      background: rgba(255, 255, 255, 0.02);
      flex-shrink: 0;
      width: max-content;
    }

    .view-switch button {
      min-width: 124px;
      padding: 12px 20px;
      border-color: transparent;
      background: transparent;
      box-shadow: none;
      font-size: 0.98rem;
      font-weight: 700;
      transition: transform 0.18s ease, background 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease, color 0.18s ease;
    }

    .view-switch button.active {
      background: rgba(127, 154, 139, 0.14);
      border-color: rgba(127, 154, 139, 0.28);
      color: var(--ink);
      box-shadow: inset 0 0 0 1px rgba(127, 154, 139, 0.18), 0 6px 16px rgba(0, 0, 0, 0.16);
    }

    button:hover:enabled {
      transform: translateY(-2px);
    }

    button:active:enabled {
      transform: translateY(1px) scale(0.99);
    }

    .primary:hover:enabled {
      box-shadow: 0 10px 18px rgba(127, 154, 139, 0.16);
    }

    .secondary:hover:enabled {
      background: rgba(255, 255, 255, 0.045);
      border-color: rgba(255, 255, 255, 0.1);
    }

    .launch-panel {
      border-radius: var(--radius-xl);
      border: 1px solid rgba(255, 255, 255, 0.055);
      background: rgba(22, 20, 17, 0.94);
      box-shadow: 0 16px 30px rgba(0, 0, 0, 0.16);
      margin-bottom: 12px;
      overflow: hidden;
    }

    .launch-panel summary {
      list-style: none;
      cursor: pointer;
      padding: 16px 18px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      font-weight: 700;
      color: var(--ink);
    }

    .launch-panel summary::-webkit-details-marker {
      display: none;
    }

    .launch-panel summary::after {
      content: "Open";
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 600;
    }

    .launch-panel[open] summary::after {
      content: "Close";
    }

    .launch-panel[open] summary {
      border-bottom: 1px solid var(--line);
    }

    .launch-summary {
      display: block;
      margin-top: 6px;
      color: var(--muted);
      font-size: 0.84rem;
      font-weight: 400;
      line-height: 1.45;
      max-width: 56ch;
    }

    .launch-title-text,
    .pane-header strong,
    .support-header strong {
      display: block;
      font-size: 1.24rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.1;
    }

    .launch-body {
      padding: 16px 18px 18px;
    }

    .launch-body .field-row {
      grid-template-columns: minmax(0, 1.7fr) minmax(0, 1fr) 120px;
    }

    .launch-actions-compact {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      margin-top: 10px;
    }

    .utility-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-left: auto;
    }

    .utility-actions button {
      padding: 9px 12px;
      font-size: 0.82rem;
    }

    .run-preview {
      display: none;
      align-items: center;
      gap: 8px;
      margin: 4px 0 14px;
      color: var(--muted);
      font-size: 0.88rem;
    }

    .run-preview.visible {
      display: flex;
    }

    .toast {
      position: fixed;
      right: 22px;
      bottom: 22px;
      z-index: 1000;
      max-width: min(320px, calc(100vw - 32px));
      padding: 11px 14px;
      border-radius: 14px;
      border: 1px solid rgba(127, 154, 139, 0.18);
      background: rgba(24, 23, 19, 0.96);
      color: var(--ink);
      box-shadow: 0 18px 44px rgba(0, 0, 0, 0.28);
      font-size: 0.9rem;
      line-height: 1.4;
      opacity: 0;
      transform: translateY(10px);
      pointer-events: none;
      transition: opacity 0.18s ease, transform 0.18s ease;
    }

    .toast.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .toast.error {
      border-color: rgba(214, 94, 94, 0.22);
      color: #ffd5d5;
    }

    .run-preview strong {
      color: var(--ink);
      font-weight: 650;
    }

    .workspace-view,
    .insights-view {
      display: none;
    }

    .workspace-view.active,
    .insights-view.active {
      display: block;
    }

    .workspace-main {
      grid-template-columns: minmax(280px, 30%) minmax(0, 70%);
      min-height: 620px;
      gap: 16px;
    }

    .list-pane,
    .detail-pane {
      display: flex;
      flex-direction: column;
      max-height: calc(100vh - 240px);
      border-radius: 22px;
      border-color: rgba(255, 255, 255, 0.055);
      background: rgba(18, 17, 14, 0.92);
      box-shadow: 0 14px 28px rgba(0, 0, 0, 0.14);
    }

    .pane-header {
      padding: 16px 18px;
    }

    .pane-copy {
      margin-top: 4px;
      font-size: 0.86rem;
      line-height: 1.4;
    }

    .list-pane .pane-body,
    .detail-pane .pane-body {
      overflow: auto;
      min-height: 0;
      overscroll-behavior: contain;
    }

    .candidate-list {
      gap: 10px;
      max-height: none;
      overflow: visible;
      padding-right: 0;
    }

    .candidate-item {
      padding: 12px 13px;
      background: rgba(255, 255, 255, 0.012);
      border-color: rgba(255, 255, 255, 0.055);
      box-shadow: none;
      transition: transform 0.18s ease, background 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
    }

    .candidate-item:hover {
      background: rgba(255, 255, 255, 0.024);
      border-color: rgba(127, 154, 139, 0.16);
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.12);
    }

    .candidate-item.active {
      background: rgba(127, 154, 139, 0.08);
      border-color: rgba(127, 154, 139, 0.3);
      box-shadow: inset 0 0 0 1px rgba(127, 154, 139, 0.14), 0 12px 26px rgba(0, 0, 0, 0.16);
    }

    .candidate-badges {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    .candidate-score {
      min-width: 52px;
      justify-content: center;
      padding: 8px 10px;
      font-size: 0.84rem;
      font-weight: 600;
      color: rgba(243, 238, 228, 0.74);
      background: rgba(255, 255, 255, 0.02);
      border-color: rgba(255, 255, 255, 0.05);
    }

    .signal-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.06);
      background: rgba(255, 255, 255, 0.032);
      color: rgba(243, 238, 228, 0.78);
      font-size: 0.74rem;
      font-weight: 600;
      letter-spacing: 0.01em;
    }

    .signal-pill--primary {
      background: rgba(127, 154, 139, 0.12);
      border-color: rgba(127, 154, 139, 0.22);
      color: var(--ink);
    }

    .candidate-summary {
      margin-top: 8px;
      font-size: 0.84rem;
      line-height: 1.45;
      -webkit-line-clamp: 2;
      color: rgba(243, 238, 228, 0.72);
    }

    .decision-sheet {
      display: grid;
      gap: 26px;
    }

    .decision-card {
      margin-bottom: 0;
      padding: 24px 24px 20px;
      background: rgba(17, 16, 13, 0.94);
      border-color: rgba(255, 255, 255, 0.06);
      box-shadow: 0 18px 34px rgba(0, 0, 0, 0.15);
    }

    .decision-head {
      display: flex;
      justify-content: space-between;
      gap: 18px;
      align-items: flex-start;
      margin-bottom: 14px;
    }

    .decision-title-block {
      min-width: 0;
    }

    .decision-title-block .person {
      font-size: 1.92rem;
      line-height: 0.98;
      letter-spacing: -0.03em;
    }

    .decision-title-block .role {
      margin-top: 6px;
      font-size: 0.93rem;
    }

    .decision-score {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 66px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.05);
      color: rgba(243, 238, 228, 0.74);
      font-size: 0.9rem;
      font-weight: 600;
    }

    .decision-badges {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .verdict-line {
      margin: 0;
      max-width: 54ch;
      font-size: 1.04rem;
      line-height: 1.55;
      font-weight: 560;
      color: var(--ink);
    }

    .case-section {
      padding: 0 0 22px;
      background: transparent;
      border: none;
      border-bottom: 1px solid rgba(255, 255, 255, 0.055);
      border-radius: 0;
    }

    .case-section:last-child {
      padding-bottom: 0;
      border-bottom: none;
    }

    .reason-list,
    .proof-list,
    .insight-list {
      margin: 0;
      padding-left: 16px;
      display: grid;
      gap: 6px;
      color: var(--ink);
      line-height: 1.6;
    }

    .match-gap-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 22px;
    }

    .compact-copy {
      margin: 0;
      color: var(--ink);
      line-height: 1.55;
      max-width: 64ch;
    }

    .confidence-block strong {
      display: block;
      margin-bottom: 4px;
      font-size: 1.04rem;
    }

    .confidence-line {
      color: var(--muted);
      line-height: 1.5;
      max-width: 60ch;
    }

    .proof-panel {
      border-radius: var(--radius-lg);
      border: 1px solid rgba(255, 255, 255, 0.05);
      background: rgba(255, 255, 255, 0.014);
      overflow: hidden;
      transition: background 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
    }

    .proof-panel:hover {
      background: rgba(255, 255, 255, 0.02);
      border-color: rgba(127, 154, 139, 0.16);
    }

    .proof-panel summary {
      list-style: none;
      cursor: pointer;
      padding: 12px 14px;
      font-weight: 700;
      color: var(--ink);
    }

    .proof-panel summary::-webkit-details-marker {
      display: none;
    }

    .proof-panel[open] summary {
      border-bottom: 1px solid var(--line);
    }

    .proof-body {
      padding: 0 14px 14px;
      opacity: 0.9;
    }

    .action-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
      padding-top: 2px;
    }

    .draft-contact-line {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
      margin: 2px 0 14px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .decision-contact-line {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .decision-actions-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 14px 0 4px;
    }

    .draft-contact-label,
    .draft-meta-label {
      color: var(--muted);
      font-size: 0.74rem;
      font-weight: 650;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .draft-contact-link {
      color: var(--ink-soft);
      font-size: 0.85rem;
      text-decoration: none;
    }

    .action-row .secondary:disabled,
    .action-row .primary:disabled {
      opacity: 0.45;
    }

    .draft-inline {
      margin-top: 16px;
      border-radius: var(--radius-lg);
      border: 1px solid rgba(255, 255, 255, 0.05);
      background: rgba(255, 255, 255, 0.014);
      padding: 14px;
    }

    .draft-inline strong {
      display: block;
      margin-bottom: 10px;
      font-size: 0.96rem;
    }

    .draft-meta {
      display: grid;
      gap: 8px;
      margin-bottom: 12px;
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }

    .draft-meta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      color: var(--ink-soft);
      font-size: 0.9rem;
    }

    .draft-tools-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 12px;
    }

    .draft-tool-btn {
      min-height: 36px;
    }

    .insights-shell {
      border-radius: var(--radius-xl);
      border: 1px solid rgba(255, 255, 255, 0.055);
      background: rgba(22, 20, 17, 0.94);
      box-shadow: 0 16px 30px rgba(0, 0, 0, 0.14);
      overflow: hidden;
    }

    .insights-header {
      padding: 16px 18px 12px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.055);
    }

    .insights-body {
      padding: 16px 18px 18px;
      display: grid;
      gap: 14px;
    }

    .insight-block {
      border-radius: var(--radius-lg);
      border: 1px solid rgba(255, 255, 255, 0.05);
      background: rgba(255, 255, 255, 0.014);
      padding: 14px 15px;
    }

    .insight-block .copy {
      margin-top: 6px;
    }

    .history-mini-list {
      display: grid;
      gap: 10px;
    }

    .history-mini-item {
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.05);
      background: rgba(255, 255, 255, 0.014);
      padding: 11px 12px;
    }

    .history-mini-top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
      margin-bottom: 8px;
    }

    .history-mini-title {
      margin: 0;
      font-size: 0.96rem;
    }

    .site-check-card {
      margin-top: 12px;
      border-radius: var(--radius-lg);
      border: 1px solid rgba(255, 255, 255, 0.05);
      background: rgba(255, 255, 255, 0.014);
      padding: 14px;
    }

    .section-kicker {
      margin-bottom: 8px;
      color: rgba(164, 154, 141, 0.74);
      letter-spacing: 0.18em;
      font-size: 0.68rem;
    }

    .launch-panel[open] .launch-body,
    .advanced-panel[open] .advanced-body,
    .proof-panel[open] .proof-body {
      animation: evidentFadeSlide 0.2s ease;
    }

    @keyframes evidentFadeSlide {
      from {
        opacity: 0;
        transform: translateY(-4px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .site-check-card ul {
      margin: 10px 0 0;
      padding-left: 18px;
      display: grid;
      gap: 8px;
      color: var(--muted);
    }

    @media (max-width: 1100px) {
      .brand-row,
      .decision-head,
      .history-mini-top {
        flex-direction: column;
        align-items: flex-start;
      }

      .hero-layout {
        grid-template-columns: 1fr;
        gap: 18px;
        align-items: start;
      }

      .brand-lockup {
        width: min(100%, 400px);
      }

      .view-switch {
        align-self: flex-start;
      }

      .launch-body .field-row,
      .match-gap-grid,
      .workspace-main {
        grid-template-columns: 1fr;
      }

      .list-pane,
      .detail-pane {
        max-height: none;
      }
    }
  </style>
<body>
  <div class="shell"></div>
  <noscript>
    <div style="padding:24px; color:#f3eee4; font-family:system-ui,-apple-system,'Segoe UI','Helvetica Neue',Arial,sans-serif;">
      Evident requires JavaScript to load the decision workspace.
    </div>
  </noscript>
  <script src="/redesign.js"></script>
</body>
</html>
